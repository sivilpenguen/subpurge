name: Update Pricing Data

on:
  schedule:
    - cron: '0 3 * * 1'   # Her Pazartesi 03:00 UTC
  workflow_dispatch:        # Manuel tetikleme

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Install Puppeteer browser
        run: node -e "require('puppeteer').executablePath()" 2>/dev/null || npx puppeteer browsers install chrome

      - name: Install system dependencies for Chromium
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libnss3 libatk1.0-0 libatk-bridge2.0-0 libcups2 \
            libxcomposite1 libxdamage1 libxfixes3 libxrandr2 \
            libgbm1 libasound2t64 libpango-1.0-0 libpangocairo-1.0-0

      - name: Run fetch-based scraper
        run: node scripts/scrape-tr-pricing.js

      - name: Run Puppeteer scraper
        run: node scripts/scrape-tr-pricing-puppeteer.js
        env:
          PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: 'false'

      - name: Commit updated pricing data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/pricing-tr.json
          git diff --staged --quiet || git commit -m "chore: update TR pricing data [skip ci]"
          git push
