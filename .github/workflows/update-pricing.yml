name: Update Pricing Data

on:
  schedule:
    - cron: '0 3 * * 1'   # Her Pazartesi 03:00 UTC
  workflow_dispatch:        # Manuel tetikleme (GitHub UI'den "Run workflow" butonu)

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run pricing scraper
        run: node scripts/scrape-tr-pricing.js

      - name: Commit updated pricing data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/pricing-tr.json
          git diff --staged --quiet || git commit -m "chore: update TR pricing data [skip ci]"
          git push
